services:
  backend:
    environment:
      - ZERODHA_API_KEY=${ZERODHA_API_KEY}
      - ZERODHA_API_SECRET=${ZERODHA_API_SECRET}
  n8n:
    image: n8nio/n8n
    container_name: tradecraft-n8n
    ports:
      - "5679:5678"
    environment:
      - TZ=Asia/Kolkata
      - GENERIC_TIMEZONE=Asia/Kolkata
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=yourpassword
      - N8N_DEFAULT_PORT=5678
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    volumes:
      - tradecraft_n8n_data:/home/node/.n8n
    depends_on:
      - backend
    networks:
      - default

networks:
  default:
    driver: bridge

volumes:
  tradecraft_n8n_data:
